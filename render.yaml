# Free-tier Git deploy for TimelySync (MongoDB Atlas + Render)
# Every push to main redeploys all three web services.
#
# Frontend is named timelysync-frontend (Node web service).
# Old static timelysync-web is removed from this file so Blueprint can delete it.

services:
  - type: web
    name: timelysync-ai
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./ai-service/Dockerfile
    dockerContext: ./ai-service
    healthCheckPath: /health
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: AI_INTERNAL_API_KEY
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        value: https://timelysync-frontend.onrender.com,https://timelysync-api.onrender.com
      - key: LOG_LEVEL
        value: INFO

  - type: web
    name: timelysync-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./timelysync-backend/timelysync-backend/Dockerfile
    dockerContext: ./timelysync-backend/timelysync-backend
    healthCheckPath: /actuator/health
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: AI_INTERNAL_API_KEY
        fromService:
          name: timelysync-ai
          type: web
          envVarKey: AI_INTERNAL_API_KEY
      - key: AI_SERVICE_URL
        value: https://timelysync-ai.onrender.com
      - key: FRONTEND_URL
        value: https://timelysync-frontend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://timelysync-frontend.onrender.com
      - key: MAIL_ENABLED
        value: "false"
      - key: ALLOW_IN_APP_RESET_FALLBACK
        value: "true"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "100"

  - type: web
    name: timelysync-frontend
    runtime: node
    plan: free
    region: oregon
    rootDir: timelysyncc-frontend
    buildCommand: npm ci && npm run build
    startCommand: npx serve -s build -l $PORT
    envVars:
      - key: REACT_APP_API_URL
        value: https://timelysync-api.onrender.com/api
      - key: NODE_VERSION
        value: "20"
