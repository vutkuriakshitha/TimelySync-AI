spring.application.name=timelysync-backend
spring.config.import=optional:file:./application-secrets.properties
# Custom MailSenderConfig owns JavaMailSender when MAIL_ENABLED=true
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

# ==================== SERVER ====================
server.port=${PORT:8080}
server.error.include-message=always
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain,text/css,application/javascript

# ==================== DATABASE (MongoDB) ====================
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/timelysync}

# ==================== JWT ====================
# JWT_SECRET must be set via environment variable in production (min 32 chars).
# The app will refuse to start with the insecure default outside of local dev.
timelysync.app.jwtSecret=${JWT_SECRET:local-dev-only-insecure-secret-change-me-32chars}
timelysync.app.jwtExpirationMs=${JWT_EXPIRATION_MS:86400000}

# ==================== CORS ====================
timelysync.app.cors.allowedOrigins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ==================== FRONTEND (used to build links in emails) ====================
timelysync.app.frontendUrl=${FRONTEND_URL:http://localhost:3000}

# ==================== FILE UPLOADS ====================
timelysync.app.uploadDir=${UPLOAD_DIR:uploads}
spring.servlet.multipart.max-file-size=${MAX_UPLOAD_SIZE_MB:15}MB
spring.servlet.multipart.max-request-size=${MAX_UPLOAD_SIZE_MB:15}MB

# ==================== RATE LIMITING ====================
timelysync.app.rateLimit.maxRequests=${RATE_LIMIT_MAX_REQUESTS:100}
timelysync.app.rateLimit.windowMs=${RATE_LIMIT_WINDOW_MS:60000}

# ==================== AI MICROSERVICE ====================
timelysync.ai.serviceUrl=${AI_SERVICE_URL:http://localhost:8000}
timelysync.ai.internalApiKey=${AI_INTERNAL_API_KEY:}

# ==================== EMAIL (required for real forgot-password / welcome mail) ====================
# Configure via .env: MAIL_HOST, MAIL_PORT, MAIL_USERNAME, MAIL_PASSWORD, MAIL_FROM
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=4000
spring.mail.properties.mail.smtp.timeout=4000
spring.mail.properties.mail.smtp.writetimeout=4000
timelysync.app.mailFrom=${MAIL_FROM:}
# Default false so local boot works without SMTP; set MAIL_ENABLED=true in .env for real email.
timelysync.app.mailEnabled=${MAIL_ENABLED:false}
# When SMTP is down, forgot-password returns a one-time resetLink in the JSON body (disable in production).
timelysync.app.allowInAppResetFallback=${ALLOW_IN_APP_RESET_FALLBACK:true}

# ==================== JACKSON ====================
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# ==================== ACTUATOR (health checks for load balancers / orchestrators) ====================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true
# SMTP is optional (EmailService degrades gracefully when unset) - don't let an
# unconfigured mail server report the whole app as DOWN to load balancers/k8s.
management.health.mail.enabled=false

# ==================== LOGGING ====================
logging.level.root=${LOG_LEVEL_ROOT:INFO}
logging.level.com.timelysync=${LOG_LEVEL_APP:INFO}
logging.level.org.springframework.security=${LOG_LEVEL_SECURITY:WARN}
logging.level.org.springframework.web=${LOG_LEVEL_WEB:WARN}
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n
